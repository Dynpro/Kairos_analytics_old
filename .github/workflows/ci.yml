name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          script: |
            # Create the home directory if for some reason it doesn't exist
            mkdir -p /home/ubuntu
            
            # Check if the project folder already exists. If not, clone it!
            if [ ! -d "/home/ubuntu/Kairos-Analytics_old" ]; then
              echo "Project directory not found. Cloning repository..."
              cd /home/ubuntu
              git clone https://github.com/Dynpro/Kairos-Analytics_old.git
            fi
            
            # Navigate to the project directory
            cd /home/ubuntu/Kairos-Analytics_old
            
            # Pull the newest code
            git pull origin main
            
            # Rebuild and restart the Docker containers
            docker-compose up -d --build

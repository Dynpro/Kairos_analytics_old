name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Frontend Image
        run: docker build -t kairos-frontend:test -f HCA_NEXT_GEN-main/Dockerfile HCA_NEXT_GEN-main/

      - name: Build Backend Image
        run: docker build -t kairos-backend:test -f hca_api-main/Dockerfile hca_api-main/

      - name: Validate Docker Compose config
        run: docker compose config

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60m
          command_timeout: 45m
          script: |
            # Check if swap is already enabled (common fix for small t3.micro instances)
            if [ $(free -m | grep Swap | awk '{print $2}') -eq 0 ]; then
               echo "Setting up 4GB swap memory to prevent build freeze..."
               sudo fallocate -l 4G /swapfile
               sudo chmod 600 /swapfile
               sudo mkswap /swapfile
               sudo swapon /swapfile
               echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            # Check if home directory exists
            mkdir -p /home/ubuntu
            
            # If the directory doesn't exist yet, it's a new instance. Clone!
            if [ ! -d "/home/ubuntu/Kairos-Analytics_old" ]; then
              echo "First time setup. Cloning project..."
              cd /home/ubuntu
              git clone https://github.com/Dynpro/Kairos-Analytics_old.git
            fi
            
            # Navigate to the project directory
            cd /home/ubuntu/Kairos-Analytics_old
            
            # Pull the newest authenticated code
            git pull origin main
            
            # Rebuild and restart the Docker containers in the background
            docker-compose up -d --build

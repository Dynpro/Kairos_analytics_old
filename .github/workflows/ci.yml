name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Frontend Image
        run: docker build -t kairos-frontend:test -f HCA_NEXT_GEN-main/Dockerfile HCA_NEXT_GEN-main/

      - name: Build Backend Image
        run: docker build -t kairos-backend:test -f hca_api-main/Dockerfile hca_api-main/

      - name: Validate Docker Compose config
        run: docker-compose config

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the OLD project directory if needed, to stop old processes
            pm2 delete predictum-frontend predictum-backend || true
            pm2 save --force || true
            
            # Navigate to the project directory on your EC2 instance (change 'ubuntu' to your user if needed)
            cd /home/ubuntu/Kairos-Analytics_old
            
            # Pull the newest authenticated code from the main branch
            git pull origin main
            
            # Rebuild and restart the Docker containers in the background
            docker-compose up -d --build

name: 🚀 Kairos CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "🚀 Starting Deployment"

            FRONTEND=/home/ubuntu/kairos/Kairos_analytics_old/HCA_NEXT_GEN-main
            BACKEND=/home/ubuntu/kairos/Kairos_analytics_old/hca_api-main
            BACKUP=/home/ubuntu/backups
            TEMP=/home/ubuntu/temp-deploy

            TIMESTAMP=$(date +%F-%H-%M)

            mkdir -p $BACKUP

            # 📦 BACKUP (only if exists)
            [ -d "$FRONTEND" ] && cp -r $FRONTEND $BACKUP/frontend_$TIMESTAMP
            [ -d "$BACKEND" ] && cp -r $BACKEND $BACKUP/backend_$TIMESTAMP

            # ⬇️ CLONE NEW CODE
            rm -rf $TEMP
            git clone https://github.com/Dynpro/Kairos_analytics_old.git $TEMP

            # 🔄 REPLACE EXISTING CODE
            rm -rf $FRONTEND
            rm -rf $BACKEND

            mv $TEMP/HCA_NEXT_GEN-main $FRONTEND
            mv $TEMP/hca_api-main $BACKEND

            rm -rf $TEMP

            # 📦 INSTALL FRONTEND
            cd $FRONTEND
            npm install

            # 📦 INSTALL BACKEND
            cd $BACKEND
            composer install --no-dev --optimize-autoloader

            # 🔄 RESTART (ignore if service not created yet)
            sudo systemctl restart kairos-frontend || true
            sudo systemctl restart kairos-backend || true

            sleep 5

            # ✅ HEALTH CHECK (skip if services not present)
            if systemctl list-units --full -all | grep -q "kairos-backend"
            then
              if systemctl is-active --quiet kairos-backend && systemctl is-active --quiet kairos-frontend
              then
                echo "✅ Deployment successful"
              else
                echo "❌ Deployment failed → Rolling back"

                LAST_FRONTEND=$(ls -td $BACKUP/frontend_* 2>/dev/null | head -1)
                LAST_BACKEND=$(ls -td $BACKUP/backend_* 2>/dev/null | head -1)

                [ -d "$LAST_FRONTEND" ] && cp -r $LAST_FRONTEND $FRONTEND
                [ -d "$LAST_BACKEND" ] && cp -r $LAST_BACKEND $BACKEND

                sudo systemctl restart kairos-frontend || true
                sudo systemctl restart kairos-backend || true

                echo "🔁 Rollback completed"
                exit 1
              fi
            else
              echo "⚠️ Services not configured, skipping health check"
            fi
